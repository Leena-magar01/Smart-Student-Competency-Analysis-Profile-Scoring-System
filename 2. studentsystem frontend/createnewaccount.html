<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - SENTINEL</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #020617, #000);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* ===== CARD ===== */
.container {
    width: 420px;
    background: rgba(15,23,42,0.85);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
    margin-bottom: 25px;
}

/* ===== INPUTS ===== */
.input-group {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
}

/* ===== ROLE SELECT ===== */
.role-select {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.role {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    background: rgba(255,255,255,0.05);
    transition: 0.3s;
}

.role:hover {
    background: rgba(99,102,241,0.3);
}

.role.active {
    background: linear-gradient(135deg,#6366f1,#22d3ee);
}

/* ===== VERIFICATION CODE ===== */
#verificationGroup {
    display: none;
}

#verificationGroup.show {
    display: block;
}

/* ===== BUTTON ===== */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg,#6366f1,#22d3ee);
    color: white;
    font-weight: 600;
    cursor: pointer;
}

/* ===== FOOTER ===== */
.footer {
    text-align: center;
    margin-top: 15px;
    font-size: 13px;
    color: #94a3b8;
}

.footer a {
    color: #22d3ee;
    text-decoration: none;
}

</style>
</head>

<body>

<div class="container">

<h2>🚀 Create Account</h2>

<!-- NAME -->
<div class="input-group">
    <input type="text" id="name" placeholder="Full Name">
</div>

<!-- EMAIL -->
<div class="input-group">
    <input type="email" id="email" placeholder="Email">
</div>

<!-- PASSWORD -->
<div class="input-group">
    <input type="password" id="password" placeholder="Password">
</div>

<!-- STUDENT ID (ONLY FOR STUDENT & PARENT) -->
<div class="input-group" id="studentIdGroup" style="display: none;">
    <input type="text" id="studentId" placeholder="Student ID (e.g., STU001)">
</div>

<!-- 6 DIGIT NUMBER (ONLY FOR STUDENT & PARENT) -->
<div class="input-group" id="verificationGroup" style="display: none;">
    <input type="number" id="verificationCode" placeholder="6-Digit Verification Code" maxlength="6" min="0" max="999999">
</div>

<!-- ROLE SELECT -->
<div class="role-select">
    <div class="role" onclick="selectRole(this,'Student')">🎓 Student</div>
    <div class="role" onclick="selectRole(this,'Teacher')">👨‍🏫 Teacher</div>
    <div class="role" onclick="selectRole(this,'Parent')">👪 Parent</div>
</div>

<!-- BUTTON -->
<button onclick="createAccount()">Create Account</button>

<div class="footer">
    Already have an account? <a href="login.html">Login</a>
</div>

</div>

<script>

let selectedRole = "";

// SELECT ROLE
function selectRole(element, role) {
    document.querySelectorAll(".role").forEach(r => r.classList.remove("active"));
    element.classList.add("active");
    selectedRole = role;
    
    // Show student ID and verification code field only for Student and Parent
    const studentIdGroup = document.getElementById("studentIdGroup");
    const verificationGroup = document.getElementById("verificationGroup");
    if(role === "Student" || role === "Parent"){
        studentIdGroup.style.display = "block";
        verificationGroup.style.display = "block";
    } else {
        studentIdGroup.style.display = "none";
        verificationGroup.style.display = "none";
    }
}

// CREATE ACCOUNT
function createAccount() {

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const studentId = document.getElementById("studentId").value;
    const verificationCode = document.getElementById("verificationCode").value;

    // Check basic fields
    if(!name || !email || !password || !selectedRole){
        alert("Please fill all fields and select role!");
        return;
    }

    // VALIDATE STUDENT ID AND 6-DIGIT CODE ONLY FOR STUDENT AND PARENT
    if(selectedRole === "Student" || selectedRole === "Parent"){
        if(!studentId){
            alert("Please enter your Student ID!");
            return;
        }
        if(!verificationCode){
            alert("Please enter your 6-digit verification code!");
            return;
        }
        if(verificationCode.length !== 6 || isNaN(verificationCode)){
            alert("Verification code must be exactly 6 digits!");
            return;
        }
    }

    // STORE DATA (demo purpose)
    const user = {
        name,
        email,
        role: selectedRole
    };
    
    // Add student ID and verification code only for Student and Parent
    if(selectedRole === "Student" || selectedRole === "Parent"){
        user.studentId = studentId;
        user.verificationCode = verificationCode;
    }

    localStorage.setItem("user", JSON.stringify(user));

    alert("Account created successfully as " + selectedRole + " 🎉");

    // REDIRECT BASED ON ROLE
    if(selectedRole === "Teacher"){
        window.location.href = "admin_dashboard.html";
    } else if(selectedRole === "Student"){
        window.location.href = "st_home.html";
    } else {
        window.location.href = "parent_dashboard.html";
    }
}

</script>

</body>
</html>
