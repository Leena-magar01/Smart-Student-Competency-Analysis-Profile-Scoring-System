<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management - SENTINEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #10b981;
            --bg: #020617;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, var(--bg), #000);
            color: var(--text-main);
            min-height: 100vh;
        }

        .container { display: flex; }

        /* Sidebar Navigation */
        .navbar {
            width: 260px;
            height: 100vh;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            position: fixed;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2.5rem;
            color: var(--accent);
        }

        .nav-links a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            color: var(--text-dim);
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent);
        }

        .logout-btn {
            margin-top: auto;
            padding: 12px;
            border-radius: 10px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--danger);
            cursor: pointer;
            transition: 0.3s;
        }

        .logout-btn:hover { background: var(--danger); color: white; }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 2rem;
            margin-left: 260px;
        }

        .dashboard-header { margin-bottom: 2rem; }
        .dashboard-header h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-dim); font-size: 0.9rem; }

        /* Search Bar */
        .search-section { margin-bottom: 2rem; }
        .search-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--card-bg);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 0.95rem;
        }

        .refresh-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        /* Table */
        .content-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { text-align: left; padding: 12px; color: var(--text-dim); font-weight: 500; font-size: 0.85rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        td { padding: 14px 12px; font-size: 0.9rem; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
        tr:hover { background: rgba(255, 255, 255, 0.02); }

        /* Status Badges */
        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge-low { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .badge-mid { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .badge-high { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .action-btn {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .action-btn:hover { background: var(--accent); color: white; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #0f172a;
            padding: 2rem;
            border-radius: 20px;
            width: 400px;
            border: 1px solid var(--accent);
            position: relative;
        }

        .modal-header { border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 1rem; padding-bottom: 0.5rem; }
        .close-modal { position: absolute; top: 15px; right: 15px; cursor: pointer; color: var(--text-dim); }

        @media (max-width: 1024px) {
            .navbar { width: 80px; padding: 2rem 0.5rem; }
            .navbar h2, .navbar span { display: none; }
            .main-content { margin-left: 80px; }
        }
    </style>
</head>

<body>
<div class="container">
    <nav class="navbar">
        <div class="nav-brand"><i class="fas fa-shield-alt"></i><h2>SENTINEL</h2></div>
        <div class="nav-links">
            <a href="admin_dashboard.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a>
            <a href="adminstudent.html" class="active"><i class="fas fa-users"></i> <span>Students</span></a>
            <a href="csv.html"><i class="fas fa-sync"></i> <span>Updates</span></a>
        </div>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></button>
    </nav>

    <main class="main-content">
        <header class="dashboard-header">
            <h1>Student Management</h1>
            <p class="subtitle">Real-time monitoring of Excel-synchronized student records</p>
        </header>

        <section class="search-section">
            <div class="search-container">
                <i class="fas fa-search" style="color: var(--accent)"></i>
                <input id="search" placeholder="Search by name, department, or city...">
                <button onclick="loadExcelData()" class="refresh-btn">
                    <i class="fas fa-sync-alt"></i> Sync Excel
                </button>
            </div>
        </section>

        <div class="content-card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Student Name</th>
                        <th>Department</th>
                        <th>Attendance</th>
                        <th>Risk Level</th>
                        <th>City</th>
                        <th>Grade</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="8" style="text-align:center; padding: 40px; color: var(--text-dim)">Syncing with Microsoft Excel data...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></span>
        <div class="modal-header">
            <h3 id="m_name">Student Profile</h3>
        </div>
        <div id="m_body" style="font-size: 0.9rem; line-height: 1.6;"></div>
        <button onclick="closeModal()" class="refresh-btn" style="width: 100%; margin-top: 1.5rem; justify-content: center;">Close</button>
    </div>
</div>

<script>
// Load data on start
document.addEventListener('DOMContentLoaded', loadExcelData);

// Real-time search
document.getElementById("search").addEventListener("input", function(e) {
    const val = e.target.value.toLowerCase();
    const rows = document.querySelectorAll("#tableBody tr");
    rows.forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
    });
});

function loadExcelData() {
    // Check both potential storage keys for compatibility
    const savedData = localStorage.getItem('dashboardCSVData') || sessionStorage.getItem('csvData');
    const tbody = document.getElementById("tableBody");
    
    if (!savedData) {
        showEmptyState();
        return;
    }

    try {
        const students = JSON.parse(savedData);
        if (!students.length) { showEmptyState(); return; }

        tbody.innerHTML = "";
        students.forEach((s, i) => {
            const risk = getRisk(s.attendance);
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>STU-${String(i + 1).padStart(3, '0')}</td>
                <td style="font-weight: 500">${s.name}</td>
                <td>${s.department}</td>
                <td>${s.attendance}%</td>
                <td><span class="badge badge-${risk.class}">${risk.label}</span></td>
                <td>${s.city || 'N/A'}</td>
                <td><strong style="color: var(--accent)">${s.grade || 'N/A'}</strong></td>
                <td><button class="action-btn" onclick="viewDetails('${encodeURIComponent(JSON.stringify(s))}')">View AI Insight</button></td>
            `;
            tbody.appendChild(tr);
        });
    } catch (e) {
        console.error("Data load error:", e);
        showEmptyState();
    }
}

function getRisk(att) {
    if (att < 60) return { label: 'HIGH RISK', class: 'high' };
    if (att < 75) return { label: 'MODERATE', class: 'mid' };
    return { label: 'LOW RISK', class: 'low' };
}

function viewDetails(dataStr) {
    const s = JSON.parse(decodeURIComponent(dataStr));
    const risk = getRisk(s.attendance);
    let aiNote = "";

    if (risk.label === 'HIGH RISK') {
        aiNote = `<p style="color: var(--danger)">⚠️ <strong>AI ALERT:</strong> Critical attendance levels. Student is at risk of academic failure. Immediate counseling required.</p>`;
    } else if (risk.label === 'MODERATE') {
        aiNote = `<p style="color: var(--warning)">📊 <strong>AI INSIGHT:</strong> Attendance is inconsistent. Early intervention recommended to prevent further decline.</p>`;
    } else {
        aiNote = `<p style="color: var(--success)">✅ <strong>AI INSIGHT:</strong> Exceptional engagement. Student maintains high performance standards.</p>`;
    }

    document.getElementById("m_name").innerText = s.name;
    document.getElementById("m_body").innerHTML = `
        <p><strong>Department:</strong> ${s.department}</p>
        <p><strong>Attendance:</strong> ${s.attendance}%</p>
        <p><strong>Location:</strong> ${s.city || 'N/A'}</p>
        <p><strong>Current Grade:</strong> ${s.grade || 'N/A'}</p>
        <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin: 15px 0;">
        ${aiNote}
    `;
    document.getElementById("modal").style.display = "flex";
}

function showEmptyState() {
    document.getElementById("tableBody").innerHTML = `
        <tr>
            <td colspan="8" style="text-align:center; padding: 60px; color: var(--text-dim)">
                <i class="fas fa-file-excel" style="font-size: 2rem; display: block; margin-bottom: 10px; opacity: 0.5;"></i>
                No Excel data found. Please upload a file on the <a href="admin_dashboard.html" style="color: var(--accent)">Dashboard</a> first.
            </td>
        </tr>
    `;
}

function closeModal() { document.getElementById("modal").style.display = "none"; }
window.onclick = function(e) { if(e.target == document.getElementById("modal")) closeModal(); }

function logout() {
    if (confirm("Logout from Sentinel?")) {
        sessionStorage.clear();
        window.location.href = "index.html";
    }
}
</script>
</body>
</html>
