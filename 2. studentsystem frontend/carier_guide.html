<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Guide - SmartEdu AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ===== GLOBAL ===== */
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: #fff;
    min-height: 100vh;
}

/* ===== NAVBAR ===== */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

.navbar h1 {
    font-size: 24px;
    background: linear-gradient(90deg, #60a5fa, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.nav-links {
    display: flex;
    gap: 30px;
}

.nav-links a {
    color: #94a3b8;
    text-decoration: none;
    font-size: 14px;
    transition: all 0.3s ease;
    padding: 8px 16px;
    border-radius: 8px;
    display: inline-block;
    border: 1px solid transparent;
}

.nav-links a:hover {
    color: #22d3ee;
    background: rgba(34, 211, 238, 0.2);
    border: 1px solid rgba(34, 211, 238, 0.5);
    box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
    transform: translateY(-2px);
}

.nav-links .active {
    color: #22d3ee;
    background: rgba(34, 211, 238, 0.25);
    border: 1px solid rgba(34, 211, 238, 0.6);
    box-shadow: 0 0 15px rgba(34, 211, 238, 0.2);
}
.hero {
    padding: 80px 40px;
    text-align: center;
}

.hero-title {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #6366f1, #22d3ee, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    position: relative;
    z-index: 2;
}

/* ===== GLITCH EFFECT ===== */
.glitch {
    position: relative;
    display: inline-block;
    font-size: 48px;
    font-weight: 700;
    animation: glitch 3s infinite;
}

@keyframes glitch {
    0% {
        transform: translate(0);
    }
    20% {
        transform: translate(-3px, 3px);
    }
    40% {
        transform: translate(-3px, -3px);
    }
    60% {
        transform: translate(3px, 3px);
    }
    80% {
        transform: translate(3px, -3px);
    }
    100% {
        transform: translate(0);
    }
}

.glitch::before,
.glitch::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    top: 0;
    opacity: 0.8;
    z-index: -1;
}

.glitch::before {
    animation: glitch-anim-1 0.3s infinite;
    clip-path: polygon(0 0, 100% 0, 100% 35%, 0 100%);
    transform: translate(-2px, -2px);
    color: #ff006e;
}

.glitch::after {
    animation: glitch-anim-2 0.3s infinite;
    clip-path: polygon(0 65%, 100% 0, 100% 100%, 0 100%);
    transform: translate(2px, 2px);
    color: #00d9ff;
}

@keyframes glitch-anim-1 {
    0% {
        clip-path: polygon(0 0, 100% 0, 100% 35%, 0 100%);
        transform: translate(-2px, -2px);
    }
    50% {
        clip-path: polygon(0 35%, 100% 0, 100% 100%, 0 65%);
        transform: translate(2px, 2px);
    }
    100% {
        clip-path: polygon(0 0, 100% 0, 100% 35%, 0 100%);
        transform: translate(-2px, -2px);
    }
}

@keyframes glitch-anim-2 {
    0% {
        clip-path: polygon(0 65%, 100% 0, 100% 100%, 0 100%);
        transform: translate(2px, 2px);
    }
    50% {
        clip-path: polygon(0 0, 100% 65%, 100% 35%, 0 0%);
        transform: translate(-2px, -2px);
    }
    100% {
        clip-path: polygon(0 65%, 100% 0, 100% 100%, 0 100%);
        transform: translate(2px, 2px);
    }
}

.hero-subtitle {
    font-size: 18px;
    color: #94a3b8;
    margin: 20px 0 40px;
}

/* ===== MAIN CONTAINER ===== */
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 40px;
}

/* ===== CAREER PATHS GRID ===== */
.career-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
    margin-bottom: 60px;
}

.career-card {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
    position: relative;
    overflow: hidden;
}

.career-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--accent-color, linear-gradient(90deg, #6366f1, #22d3ee));
}

.career-card:hover {
    transform: translateY(-8px);
    border-color: rgba(255, 255, 255, 0.15);
    background: rgba(15, 23, 42, 0.9);
    box-shadow: 0 20px 40px rgba(99, 102, 241, 0.2);
}

.career-icon {
    font-size: 48px;
    margin-bottom: 20px;
}

.career-card h3 {
    font-size: 22px;
    margin-bottom: 15px;
    color: #fff;
}

.career-card p {
    color: #cbd5f1;
    line-height: 1.6;
    margin-bottom: 20px;
    font-size: 14px;
}

.career-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
}

.tag {
    background: rgba(99, 102, 241, 0.2);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    color: #a5b4fc;
    border: 1px solid rgba(99, 102, 241, 0.4);
}

.career-link {
    display: inline-block;
    padding: 12px 20px;
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(34, 211, 238, 0.2));
    border: 1px solid rgba(99, 102, 241, 0.4);
    border-radius: 8px;
    color: #a5b4fc;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.career-link:hover {
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.5), rgba(34, 211, 238, 0.4));
    transform: scale(1.05);
}

/* ===== SALARY COMPARISON ===== */
.salary-section {
    margin-bottom: 60px;
}

.section-title {
    font-size: 40px;
    font-weight: bold;
    margin-bottom: 15px;
    margin-top: -20px;
    text-align: center;
    color: #fff;
}

.salary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.salary-card {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    text-align: center;
}

.salary-card h4 {
    margin-bottom: 15px;
    color: #60a5fa;
}

.salary-amount {
    font-size: 32px;
    font-weight: 700;
    color: #22d3ee;
    margin-bottom: 10px;
}

.salary-range {
    font-size: 13px;
    color: #94a3b8;
}

/* ===== SKILLS SECTION ===== */
.skills-section {
    margin-bottom: 60px;
}

.skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
}

.skill-card {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.08);
}

.skill-card h4 {
    margin-bottom: 20px;
    color: #818cf8;
}

.skill-bar {
    margin-bottom: 20px;
}

.skill-name {
    font-size: 13px;
    color: #cbd5f1;
    margin-bottom: 8px;
}

.skill-progress {
    height: 8px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    overflow: hidden;
}

.skill-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #6366f1, #22d3ee);
    border-radius: 10px;
}

/* ===== SCANLINE EFFECT ===== */
.scanlines {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.02) 3px
    );
    pointer-events: none;
    z-index: 1000;
}

/* ===== FOOTER ===== */
.footer {
    padding: 40px 40px;
    text-align: center;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    margin-top: 80px;
}

.footer p {
    color: #94a3b8;
    font-size: 14px;
}

/* ===== NEWS SECTION ===== */
.news-section {
    margin-bottom: 60px;
}

.news-filters {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 40px;
    flex-wrap: wrap;
}

.filter-btn {
    padding: 14px 24px;
    background: rgba(99, 102, 241, 0.2);
    border: 1px solid rgba(99, 102, 241, 0.4);
    border-radius: 12px;
    color: #a5b4fc;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    min-width: 140px;
}

.filter-btn:hover,
.filter-btn.active {
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.5), rgba(34, 211, 238, 0.4));
    border-color: rgba(99, 102, 241, 0.7);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
}

.news-content-container {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 40px;
    align-items: start;
}

.trending-sidebar {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 25px;
    position: sticky;
    top: 20px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
}

.section-subtitle {
    font-size: 18px;
    margin-bottom: 20px;
    color: #fff;
    font-weight: 600;
}

.trending-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.trend-item {
    padding: 14px 16px;
    background: rgba(99, 102, 241, 0.1);
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    color: #cbd5f1;
    transition: all 0.3s ease;
    border: 1px solid rgba(99, 102, 241, 0.2);
    line-height: 1.4;
}

.trend-item:hover {
    background: rgba(99, 102, 241, 0.3);
    transform: translateX(5px);
    border-color: rgba(99, 102, 241, 0.5);
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
}

.news-main-content {
    min-height: 600px;
}

.news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 30px;
}

.news-card {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.08);
    transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
    cursor: pointer;
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
}

.news-card:hover {
    transform: translateY(-8px);
    border-color: rgba(255, 255, 255, 0.15);
    background: rgba(15, 23, 42, 0.9);
    box-shadow: 0 20px 40px rgba(99, 102, 241, 0.2);
}

.news-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
}

.news-content {
    padding: 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
}

.news-tag {
    font-size: 11px;
    color: #a5b4fc;
    background: rgba(99, 102, 241, 0.2);
    padding: 6px 12px;
    border-radius: 6px;
    display: inline-block;
    margin-bottom: 14px;
    border: 1px solid rgba(99, 102, 241, 0.4);
    text-transform: uppercase;
    font-weight: 600;
    align-self: flex-start;
}

.news-title {
    font-size: 16px;
    margin: 0 0 12px 0;
    color: #fff;
    font-weight: 600;
    line-height: 1.4;
    flex: 1;
}

.news-desc {
    font-size: 13px;
    color: #cbd5f1;
    line-height: 1.5;
    margin-bottom: 18px;
    flex: 1;
}

.ai-summary-btn {
    padding: 10px 16px;
    background: linear-gradient(135deg, rgba(34, 211, 238, 0.3), rgba(168, 85, 247, 0.3));
    border: 1px solid rgba(34, 211, 238, 0.4);
    border-radius: 8px;
    color: #22d3ee;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    align-self: flex-start;
}

.ai-summary-btn:hover {
    background: linear-gradient(135deg, rgba(34, 211, 238, 0.5), rgba(168, 85, 247, 0.5));
    transform: scale(1.05);
    box-shadow: 0 4px 12px rgba(34, 211, 238, 0.3);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .navbar {
        padding: 15px 20px;
        flex-direction: column;
        gap: 20px;
    }

    .hero {
        padding: 40px 20px;
    }

    .hero-title {
        font-size: 32px;
    }

    .container {
        padding: 0 20px;
    }

    .career-grid,
    .salary-grid,
    .skills-grid,
    .news-grid {
        grid-template-columns: 1fr;
    }

    .news-content-container {
        grid-template-columns: 1fr;
        gap: 30px;
    }

    .trending-sidebar {
        position: static;
        order: -1;
    }

    .news-filters {
        justify-content: center;
        gap: 12px;
    }

    .filter-btn {
        padding: 12px 18px;
        font-size: 13px;
        min-width: 120px;
    }

    .trending-list {
        gap: 10px;
    }

    .trend-item {
        padding: 12px 14px;
        font-size: 13px;
    }

    .news-card {
        max-width: 100%;
    }

    .news-content {
        padding: 20px;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h3>🎓 Student Dashboard</h3>
    <div class="nav-links">
        <a href="st_home.html" class="active">Dashboard</a>
        <a href="acadmics.html">Academics</a>
        <a href="ai_tutor.html">AI Tutor</a>
        <a href="learn_hub.html">Learning Hub</a>
        <a href="carier_guide.html">Career</a>
    </div>
</div>

<!-- HERO SECTION -->
<div class="hero">
    <h2 class="hero-title">
        <span class="glitch" data-text="Plan Your Future">Plan Your Future</span>
    </h2>

</div>

<!-- MAIN CONTENT -->
<div class="container">
<!-- NEWS SECTION -->
    <section class="news-section">
        <h2 class="section-title">📰 Tech & Industry News</h2>

        <!-- Category Filters -->
        <div class="news-filters">
            <button onclick="setCategory('technology')" class="filter-btn active">💻 Technology</button>
            <button onclick="setCategory('business')" class="filter-btn">🏭 Industry</button>
            <button onclick="setCategory('science')" class="filter-btn">🔬 AI & Science</button>
        </div>

        <!-- Content Container -->
        <div class="news-content-container">
            <!-- Trending Section -->
            <aside class="trending-sidebar">
                <h3 class="section-subtitle">🔥 Trending Now</h3>
                <div id="trending" class="trending-list"></div>
            </aside>

            <!-- News Grid -->
            <div class="news-main-content">
                <div class="news-grid" id="newsGrid"></div>
            </div>
        </div>
    </section>

</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 SmartEdu AI. Your partner in career growth and skill development.</p>
</div>

<!-- SCANLINES EFFECT -->
<div class="scanlines"></div>

<script>
const API_KEY = "36116e5b2c2d4b08898c79b7d2e68131";
let currentCategory = "technology";

// ================= FETCH NEWS =================
async function fetchNews(category = "technology") {
    try {
        const url = `https://newsapi.org/v2/top-headlines?category=${category}&language=en&pageSize=12&apiKey=${API_KEY}`;

        const res = await fetch(url);
        const data = await res.json();

        if (data.status === "ok") {
            renderNews(data.articles);
            renderTrending(data.articles.slice(0, 5));
        } else {
            console.error("NewsAPI Error:", data.message);
            showFallbackNews();
        }
    } catch (error) {
        console.error("Error fetching news:", error);
        showFallbackNews();
    }
}

// ================= RENDER NEWS =================
function renderNews(articles) {
    const grid = document.getElementById("newsGrid");
    grid.innerHTML = "";

    if (articles.length === 0) {
        grid.innerHTML = `
        <div class="news-card" style="grid-column: 1 / -1; text-align: center; padding: 60px;">
            <div class="news-content">
                <div style="font-size: 48px; margin-bottom: 20px;">📰</div>
                <div class="news-title">No articles found</div>
                <div class="news-desc">Try selecting a different category or check back later.</div>
            </div>
        </div>`;
        return;
    }

    articles.forEach(article => {
        if (!article.urlToImage) return;

        grid.innerHTML += `
        <div class="news-card" onclick="openArticle('${article.url}')">
            <img src="${article.urlToImage}" alt="${article.title}" loading="lazy">
            <div class="news-content">
                <div class="news-tag">${currentCategory}</div>
                <div class="news-title">${article.title}</div>
                <div class="news-desc">${article.description || "Click to read more..."}</div>
                <button class="ai-summary-btn" onclick="event.stopPropagation(); summarize('${encodeURIComponent(article.title)}')">🤖 AI Summary</button>
            </div>
        </div>`;
    });
}

// ================= TRENDING =================
function renderTrending(articles) {
    const trending = document.getElementById("trending");
    trending.innerHTML = "";

    if (articles.length === 0) {
        trending.innerHTML = "<div class='trend-item'>🔄 Loading trending articles...</div>";
        return;
    }

    articles.forEach(a => {
        trending.innerHTML += `
        <div class="trend-item" onclick="openArticle('${a.url}')">
            🔥 ${a.title}
        </div>`;
    });
}

// ================= OPEN ARTICLE =================
function openArticle(url) {
    window.open(url, "_blank");
}

// ================= AI SUMMARY =================
async function summarize(encodedTitle) {
    const title = decodeURIComponent(encodedTitle);
    alert("🤖 Generating AI summary for: " + title);

    try {
        const res = await fetch("https://api-inference.huggingface.co/models/facebook/bart-large-cnn", {
            method: "POST",
            headers: {
                "Authorization": "Bearer YOUR_HF_API_KEY",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ inputs: title })
        });

        const data = await res.json();
        alert("📝 AI Summary: " + (data[0]?.summary_text || "Summary not available"));
    } catch (error) {
        alert("❌ AI Summary service temporarily unavailable");
        console.error("AI Summary error:", error);
    }
}

// ================= FILTER =================
function setCategory(cat) {
    currentCategory = cat;

    // Update active button
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    event.target.classList.add('active');

    fetchNews(cat);
}

// ================= FALLBACK NEWS =================
function showFallbackNews() {
    const grid = document.getElementById("newsGrid");
    grid.innerHTML = `
        <div class="news-card" style="grid-column: 1 / -1;">
            <div class="news-content" style="text-align: center; padding: 60px;">
                <div style="font-size: 48px; margin-bottom: 20px;">📰</div>
                <div class="news-title">Loading Latest News...</div>
                <div class="news-desc">Fetching the most recent articles from trusted sources.</div>
            </div>
        </div>`;

    const trending = document.getElementById("trending");
    trending.innerHTML = "<div class='trend-item'>🔄 Loading trending articles...</div>";
}

// ================= INIT =================
document.addEventListener('DOMContentLoaded', function() {
    // Add glitch effect to hero
    const glitchElements = document.querySelectorAll('.glitch');
    glitchElements.forEach(el => {
        const text = el.textContent;
        el.setAttribute('data-text', text);
    });

    // Show loading state initially
    showFallbackNews();

    // Load initial news
    fetchNews();
});

// Highlight current page in navbar
document.addEventListener('DOMContentLoaded', function() {
    const currentPage = window.location.pathname.split('/').pop() || 'st_home.html';
    const navLinks = document.querySelectorAll('.nav-links a');
    
    navLinks.forEach(link => {
        link.classList.remove('active');
        const href = link.getAttribute('href');
        if (href === currentPage || (currentPage === '' && href === 'st_home.html')) {
            link.classList.add('active');
        }
    });
});
</script>

</body>
</html>
